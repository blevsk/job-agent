name: Deploy dev to staging

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: staging-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Inject secrets and cache-bust
        env:
          ISSUES_TOKEN: ${{ secrets.ISSUES_TOKEN }}
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          find docs/ -name "*.js" | while read f; do
            [ -n "$ISSUES_TOKEN" ] && sed -i "s|REMPLACER_PAR_TON_TOKEN_ISSUES|${ISSUES_TOKEN}|g" "$f"
            sed -i "s|CACHE_BUST|${GIT_SHA}|g" "$f"
          done
          sed -i "s|CACHE_BUST|${GIT_SHA}|g" docs/index.html

      - name: Deploy staging
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/
          target-folder: staging/
          clean: true
