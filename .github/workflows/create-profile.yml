name: Create profile from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: create-profile-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create:
    # Only process issues with the expected title prefix
    if: startsWith(github.event.issue.title, '[job-agent] ')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create profile files from issue body
        id: create
        run: |
          python scripts/create_profile_from_issue.py << 'ISSUE_BODY_EOF'
          ${{ github.event.issue.body }}
          ISSUE_BODY_EOF

      - name: Build offers for new profile
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_APPRENTISSAGE_KEY: ${{ secrets.API_APPRENTISSAGE_KEY }}
        run: |
          PROFILE_ID=$(python -c "import json,sys; print(json.loads(open('/tmp/job_agent_profile.json').read())['profileId'])")
          python scripts/build_offers.py --profile "$PROFILE_ID"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profiles/ docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            PROFILE_ID=$(python -c "import json; print(json.loads(open('/tmp/job_agent_profile.json').read())['profileId'])")
            git commit -m "feat: add profile ${PROFILE_ID} [skip ci]"
            git push
          fi

      - name: Close issue with success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Profil créé et offres générées avec succès.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Close issue with error comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Échec de la création du profil. Voir les logs du workflow.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['error']
            });
