name: Create profile from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: create-profile-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create:
    if: startsWith(github.event.issue.title, '[job-agent] ')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-models-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create profile files
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 -c "import os,sys; sys.stdout.write(os.environ['ISSUE_BODY'])" \
            | python scripts/create_profile_from_issue.py

      - name: Build offers
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_APPRENTISSAGE_KEY: ${{ secrets.API_APPRENTISSAGE_KEY }}
        run: |
          PROFILE_ID=$(python3 -c "import json; print(json.load(open('/tmp/job_agent_profile.json'))['profileId'])")
          python scripts/build_offers.py --profile "$PROFILE_ID"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add profiles/ docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            PROFILE_ID=$(python3 -c "import json; print(json.load(open('/tmp/job_agent_profile.json'))['profileId'])")
            git commit -m "feat: add profile ${PROFILE_ID}"
            git push
          fi

      - name: Generate tracking token and notify browser
        env:
          PAT_MASTER: ${{ secrets.PAT_MASTER }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$PAT_MASTER" ]; then
            echo "PAT_MASTER non configuré — sync tracking ignoré."
            exit 0
          fi

          PROFILE_ID=$(python3 -c "import json; print(json.load(open('/tmp/job_agent_profile.json'))['profileId'])")
          EXPIRES=$(date -d "+365 days" +%Y-%m-%d)

          # Créer un fine-grained PAT contents:write sur job-agent
          RESPONSE=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer $PAT_MASTER" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/personal-access-tokens" \
            -d "{\"name\":\"job-agent-${PROFILE_ID}\",\"expires_at\":\"${EXPIRES}\",\"repositories\":[\"job-agent\"],\"permissions\":{\"contents\":\"write\"}}" \
            2>/dev/null || echo "{}")

          TRACKING_TOKEN=$(echo "$RESPONSE" | python3 -c \
            "import json,sys; print(json.load(sys.stdin).get('token') or '')" 2>/dev/null || echo "")

          if [ -z "$TRACKING_TOKEN" ]; then
            echo "Création du token échouée (PAT_MASTER insuffisant ?)."
            exit 0
          fi

          # Masquer le token dans les logs
          echo "::add-mask::$TRACKING_TOKEN"

          # Poster le token en commentaire de l'issue
          COMMENT_ID=$(gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -f "body=TRACKING_TOKEN: ${TRACKING_TOKEN}" \
            --jq .id)

          echo "Commentaire posté (id: $COMMENT_ID). Attente 120s…"
          sleep 120

          # Supprimer le commentaire
          gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}"
          echo "Commentaire supprimé."

      - name: Close issue — succès
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -f "body=✅ Profil créé et offres générées."
          gh api -X PATCH \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
            -f "state=closed"

      - name: Close issue — échec
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -f "body=❌ Échec de la création du profil. Voir les logs du workflow."
          gh api -X PATCH \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
            -f "state=closed"
