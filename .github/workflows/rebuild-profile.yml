name: Rebuild profile offers

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  rebuild:
    if: startsWith(github.event.issue.title, '[job-agent-rebuild] ')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-models-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply config from issue and extract profile ID
        id: pid
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 - <<'EOF'
import os, json
from pathlib import Path

data = json.loads(os.environ['ISSUE_BODY'])
pid  = data['profileId']

profile_dir = Path('profiles') / pid
profile_dir.mkdir(parents=True, exist_ok=True)

if 'profileMd' in data:
    (profile_dir / 'profile.md').write_text(data['profileMd'], encoding='utf-8')
if 'searchConfig' in data:
    (profile_dir / 'search.config.json').write_text(
        json.dumps(data['searchConfig'], ensure_ascii=False, indent=2), encoding='utf-8')
if 'scoringConfig' in data:
    (profile_dir / 'scoring.config.json').write_text(
        json.dumps(data['scoringConfig'], ensure_ascii=False, indent=2), encoding='utf-8')
if 'poste' in data:
    meta_path = profile_dir / 'meta.json'
    meta = json.loads(meta_path.read_text(encoding='utf-8')) if meta_path.exists() else {}
    meta['label'] = data['poste']
    meta_path.write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding='utf-8')

with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
    f.write(f'profile_id={pid}\n')
print(f'[ok] Config applied for profile {pid}')
EOF

      - name: Build offers
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_APPRENTISSAGE_KEY: ${{ secrets.API_APPRENTISSAGE_KEY }}
        run: python scripts/build_offers.py --profile "${{ steps.pid.outputs.profile_id }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "feat: rebuild offers ${{ steps.pid.outputs.profile_id }}"
            git push
          fi

      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo ${{ github.repository }}

      - name: Close issue — succès
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -f "body=✅ Offres mises à jour."
          gh api -X PATCH \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
            -f "state=closed"

      - name: Close issue — échec
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -f "body=❌ Rebuild échoué. Voir les logs du workflow."
          gh api -X PATCH \
            "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
            -f "state=closed"
