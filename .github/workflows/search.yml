name: Build offers

on:
  workflow_dispatch:
  schedule:
    # tous les jours à 05:00 UTC (07:00 Paris été / 06:00 hiver)
    - cron: '0 5 * * *'

permissions:
  contents: write

concurrency:
  group: build-offers
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run search
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_APPRENTISSAGE_KEY: ${{ secrets.API_APPRENTISSAGE_KEY }}
        run: python scripts/build_offers.py

      - name: Commit offers.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/offers.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh offers.json [skip ci]"
            git push
          fi

      - name: Push to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg https://blevsk:${CODEBERG_TOKEN}@codeberg.org/blevsk/job-agent.git
          git push codeberg main --force-with-lease
          # Deploy docs/ vers la branche pages de Codeberg
          git fetch codeberg pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/codeberg/pages; then
            git worktree add /tmp/pages-tree -b pages codeberg/pages
          else
            git worktree add /tmp/pages-tree --orphan pages
          fi
          rsync -a --delete docs/ /tmp/pages-tree/
          cd /tmp/pages-tree
          git add -A
          if git diff --staged --quiet; then
            echo "Pages inchangées."
          else
            git commit -m "chore: deploy pages [skip ci]"
            git push codeberg pages
          fi
