<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Agent — offres scorées</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Job Agent</h1>
    <p id="meta">Chargement…</p>
    <div id="dashboard" hidden></div>
  </header>

  <section class="controls">
    <input id="filter" type="search" placeholder="Filtrer (titre, entreprise, lieu, justification LLM)…" autofocus>
    <label><input id="hideNegative" type="checkbox"> Masquer scores négatifs</label>
    <label><input id="hideRead" type="checkbox"> Masquer les lues</label>
    <select id="filterStatus">
      <option value="">Tous les statuts</option>
      <option value="__none__">Sans statut</option>
      <option value="Postulée">Postulée</option>
      <option value="Entretien">Entretien</option>
      <option value="Relancée">Relancée</option>
      <option value="Refusée">Refusée</option>
    </select>
    <a id="markAllRead" href="#">Tout marquer comme lu</a>
    <span id="sync-status" class="sync-status"></span>
    <button id="gh-config" class="gh-config-btn" title="Configurer la synchronisation GitHub">⚙</button>
  </section>

  <div id="table-wrapper">
  <table id="offers">
    <thead>
      <tr>
        <th data-sort="llm_rank" class="col-rank">Rang LLM</th>
        <th data-sort="score">Score</th>
        <th data-sort="title">Titre</th>
        <th data-sort="company">Entreprise</th>
        <th data-sort="location">Lieu</th>
        <th data-sort="contract_type">Contrat</th>
        <th data-sort="rome_code" class="col-rome">ROME / Sém.</th>
        <th data-sort="posted_days_ago" class="col-age">Publié</th>
        <th>Lien</th>
        <th>Statut</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  </div>

  <p id="empty" hidden>Aucune offre. Lance le workflow GitHub Action pour générer <code>offers.json</code>.</p>

  <script src="app.js"></script>
</body>
</html>
