<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Agent — offres scorées</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Job Agent</h1>
    <p id="meta">Chargement…</p>
    <div id="dashboard" hidden></div>
  </header>

  <dialog id="add-dialog">
    <div class="dialog-header">
      <button type="button" class="dialog-close" aria-label="Fermer">✕</button>
      <h2>Ajouter une offre</h2>
    </div>
    <form id="add-form">
      <label>Titre <span class="req">*</span><input name="title" required placeholder="Ex : Assistante administrative…"></label>
      <label>Entreprise<input name="company" placeholder="Ex : Mairie de Lille"></label>
      <label>Lieu<input name="location" placeholder="Ex : Lille, Roubaix…"></label>
      <div class="form-row">
        <label>Contrat
          <select name="contract_type">
            <option value="">—</option>
            <option value="Alternance" selected>Alternance</option>
            <option value="CDI">CDI</option>
            <option value="CDD">CDD</option>
            <option value="Stage">Stage</option>
            <option value="Intérim">Intérim</option>
          </select>
        </label>
        <label>Trouvée sur
          <select name="source">
            <option value="LinkedIn">LinkedIn</option>
            <option value="Indeed">Indeed</option>
            <option value="APEC">APEC</option>
            <option value="HelloWork">HelloWork</option>
            <option value="Site entreprise">Site entreprise</option>
            <option value="Autre">Autre</option>
          </select>
        </label>
      </div>
      <label>Lien vers l'offre <span class="req">*</span><input name="url" type="url" required placeholder="https://…"></label>
      <label>Description <span class="opt">(optionnel)</span><textarea name="snippet" rows="6" placeholder="Colle ici un extrait de l'offre…"></textarea></label>
      <div class="form-actions">
        <button type="button" id="cancel-add" class="btn-cancel">Annuler</button>
        <button type="submit" class="btn-primary">Ajouter l'offre</button>
      </div>
    </form>
  </dialog>

  <dialog id="notes-dialog">
    <div class="dialog-header">
      <button type="button" id="close-notes" class="dialog-close" aria-label="Fermer">✕</button>
      <h2 id="notes-dialog-title">Notes</h2>
    </div>
    <div id="notes-form">
      <label>Vos notes<textarea id="notes-dialog-area" rows="6" placeholder="Numéro de tél, nom du contact, ressenti, infos importantes…"></textarea></label>
      <div class="form-actions">
        <button type="button" id="close-notes-btn" class="btn-primary">Fermer</button>
      </div>
    </div>
  </dialog>

  <section class="controls">
    <div class="ctrl-top">
      <input id="filter" type="search" placeholder="Filtrer…" autofocus>
      <button id="open-add" class="btn-add">+ Ajouter</button>
      <button id="gh-config" class="gh-config-btn" title="Configurer la synchronisation GitHub">⚙</button>
    </div>
    <div class="ctrl-bottom">
      <label><input id="hideNegative" type="checkbox"> Masquer négatifs</label>
      <label><input id="hideRead" type="checkbox"> Masquer lues</label>
      <select id="filterStatus">
        <option value="">Tous statuts</option>
        <option value="__none__">Sans statut</option>
        <option value="Postulée">Postulée</option>
        <option value="Entretien">Entretien</option>
        <option value="Relancée">Relancée</option>
        <option value="Refusée">Refusée</option>
      </select>
      <a id="markAllRead" href="#">Tout lire</a>
      <a id="exportCsv" href="#">Export CSV</a>
      <span id="sync-status" class="sync-status"></span>
    </div>
  </section>

  <div id="table-wrapper">
  <table id="offers">
    <thead>
      <tr>
        <th data-sort="llm_rank" class="col-rank">Rang LLM</th>
        <th data-sort="score">Score</th>
        <th data-sort="title">Titre</th>
        <th data-sort="company">Entreprise</th>
        <th data-sort="location">Lieu</th>
        <th data-sort="contract_type">Contrat</th>
        <th data-sort="rome_code" class="col-rome">ROME / Sém.</th>
        <th data-sort="posted_days_ago" class="col-age">Publié</th>
        <th>Lien</th>
        <th>Statut</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  </div>

  <p id="empty" hidden>Aucune offre. Lance le workflow GitHub Action pour générer <code>offers.json</code>.</p>

  <script src="app.js"></script>
</body>
</html>
